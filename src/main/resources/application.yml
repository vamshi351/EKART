# src/main/resources/application.yml

server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vamshi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Vaanara*
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update  # Use 'validate' in prod, 'update' for dev
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  mail:
    host: localhost
    port: 5025
    username: user
    password: pass
    protocol: smtp
    default-encoding: UTF-8
    properties.mail.smtp:
      auth: true
      starttls.enable: true

# JWT Config
jwt:
  secret: your-super-secret-jwt-signing-key-that-is-at-least-256-bits-long-and-very-secure!
  expiration.ms: 86400000  # 24 hours

logging:
  level:
    com.example.userservice: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
